name: Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override for manual builds"
        required: false
        type: string
      uos_installer_url:
        description: "Optional UOS installer URL build arg override"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  DEFAULT_IMAGE_TAG: 5.0.6
  DEFAULT_UOS_INSTALLER_URL: https://fw-download.ubnt.com/data/unifi-os-server/1856-linux-x64-5.0.6-33f4990f-6c68-4e72-9d9c-477496c22450.6-x64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image metadata
        id: vars
        run: |
          OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"

          if [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          else
            IMAGE_TAG="${DEFAULT_IMAGE_TAG}"
          fi

          if [ -n "${{ inputs.uos_installer_url }}" ]; then
            UOS_INSTALLER_URL="${{ inputs.uos_installer_url }}"
          else
            UOS_INSTALLER_URL="${DEFAULT_UOS_INSTALLER_URL}"
          fi

          echo "image_tag=${IMAGE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "uos_installer_url=${UOS_INSTALLER_URL}" >> "${GITHUB_OUTPUT}"
          echo "image=${REGISTRY}/${OWNER_LOWER}/unifi-os" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.image_tag }}
          build-args: |
            UOS_INSTALLER_URL=${{ steps.vars.outputs.uos_installer_url }}
