name: Release Helm Chart

on:
  push:
    branches:
      - main
  workflow_dispatch: {}
        
jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Sync chart README from repository README
        run: |
          cp README.md charts/unifi-os/README.md
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          readme_path = Path("charts/unifi-os/README.md")
          text = readme_path.read_text(encoding="utf-8")
          repo = os.environ["GITHUB_REPOSITORY"]
          ref = os.environ.get("GITHUB_REF_NAME", "main")
          base = f"https://github.com/{repo}/blob/{ref}/"

          def rewrite(match):
            label = match.group(1)
            target = match.group(2)
            if (
              target.startswith(("http://", "https://", "mailto:", "#"))
              or target.startswith("<")
            ):
              return match.group(0)
            if target.startswith("/"):
              target = target[1:]
            return f"[{label}]({base}{target})"

          text = re.sub(r"\[([^\]]+)\]\(([^)]+)\)", rewrite, text)
          readme_path.write_text(text, encoding="utf-8")
          PY

      - name: Add dependency repos
        run: |
          helm repo add hull https://vidispine.github.io/hull
          helm repo add cloudnative-pg https://cloudnative-pg.github.io/charts
          helm dependency update charts/unifi-os

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
