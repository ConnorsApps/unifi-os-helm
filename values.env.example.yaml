# yaml-language-server: $schema=https://raw.githubusercontent.com/vidispine/hull/refs/heads/main/hull/values.schema.json

global:
  postgres:
    connection:
      password: ""   # required unless global.postgres.connection.useExistingSecrets: true
  rabbitmq:
    connection:
      password: ""
      erlangCookie: ""

# Toggle bundled dependencies for this cluster.
rabbitmq:
  enabled: true
  persistence:
    storageClass: ""
postgres:
  enabled: true
  cluster:
    storage:
      storageClass: ""

# ------------------------------------------------------------------
# UniFi Network Application settings
# ------------------------------------------------------------------
unifi:
  # Cluster-specific storage class override.
  storage:
    statefulset:
      storageClassName: ""
      sizes:
        persistent: 10Gi
        data: 10Gi
        srv: 5Gi
        unifi: 10Gi
        log: 5Gi
  # Externally reachable controller address for device inform URL.
  uosSystemIP: "my-unifi-site.com"
  # Gateway API wiring is cluster-specific.
  gateway:
    parentRef:
      name: "private"
      namespace: "istio-system"
    httpRoute:
      enabled: true
      hostname: "my-unifi-site.com"
      sectionName: "https-default"
    tcpRoute:
      enabled: true
      sectionName: "unifi-8080"
    udpRoutes:
      discovery:
        enabled: true
        sectionName: "unifi-ap-discovery"
      stun:
        enabled: true
        sectionName: "unifi-stun"
      syslog:
        enabled: true
        sectionName: "unifi-remote-syslog"
  istio:
    destinationRule:
      enabled: true

# ------------------------------------------------------------------
# Backup credentials
# Create a Local UniFi OS user (not cloud): Settings > Admins & Users > Add Admin > Local Access Only.
# Role must be Administrator for UniFi Network.
# ------------------------------------------------------------------
backup:
  enabled: true
  username: backup
  # Password for the local backup user created above.
  password: "change-me"

  # Storage backend URL — supports file://, smb://, s3://, gs://
  # See https://github.com/ConnorsApps/unifi-backup/blob/main/CONFIGURATION.md
  storageUrl: "file://./backups"

# ------------------------------------------------------------------
# UniFi Exporter (unpoller) — Prometheus metrics scraper
# Enable one of the three auth options below; disable the others.
# ------------------------------------------------------------------

# Option 1: API key (recommended for UniFi OS 4+)
#   Generate in UniFi OS: Settings > Admins & Users > (your user) > API Key.
# unifiExporter:
#   enabled: true
#   config:
#     apiKey: "your-api-key"

# Option 2: Username + password (plaintext in Helm values)
#   Create a local read-only user: Settings > Admins & Users > Add Admin >
#   Local Access Only. Role: Viewer is sufficient.
# unifiExporter:
#   enabled: true
#   config:
#     username: "metrics"
#     password: "change-me"

# Option 3: Pre-existing Kubernetes Secret
#   Secret must live in the same namespace as the release.
#   It needs either a "password" key, an "api-key" key, or both.
#   Whichever key is present and non-empty will be used; api-key takes priority.
# unifiExporter:
#   enabled: true
#   config:
#     username: "metrics"   # still required when using password auth via existing secret
#   existingSecret:
#     name: "my-unifi-exporter-secret"
#     passwordKey: password   # default; omit if secret only has api-key
#     apiKeyKey: api-key      # default; omit if secret only has password

# Additional collection options (all default to false):
# unifiExporter:
#   config:
#     saveEvents: true      # client connect/disconnect and network events
#     saveAlarms: true      # security and network alarms
#     saveAnomalies: true   # detected network anomalies
#     saveIds: true         # device ID-to-name label mappings
#     hashPii: true         # hash MAC addresses and client names (privacy/compliance)
