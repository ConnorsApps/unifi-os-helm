apiVersion: v2
name: unifi-os
description: >-
  UniFi OS Server - self-hosted UniFi management platform
type: application
version: 0.3.3
appVersion: "5.0.6"
dependencies:
  - name: hull
    version: "1.35.2"
    repository: "https://vidispine.github.io/hull"

  # RabbitMQ via CloudPirates chart.
  - name: rabbitmq
    repository: oci://registry-1.docker.io/cloudpirates
    version: "0.17.1"
    condition: rabbitmq.enabled

  # CloudNativePG cluster dependency. Set postgres.enabled: true.
  - name: cluster
    repository: https://cloudnative-pg.github.io/charts
    version: "0.4.0"
    alias: postgres
    condition: postgres.enabled
