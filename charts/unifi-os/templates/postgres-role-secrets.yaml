{{/*
When postgres.enabled is true and connection.password is set (postgres.useExistingSecrets is false),
generate one kubernetes.io/basic-auth secret per CNPG managed role named pg-login-<rolename>.
These match the passwordSecret.name defaults in values.yaml so CNPG can bootstrap without
requiring pre-created secrets.
*/}}
{{- if .Values.postgres.enabled }}
{{- $conn := include "unifi-os.mergedConnection" (dict "root" . "service" "postgres") | fromYaml }}
{{- $password := index $conn "password" | default "" }}
{{- if and (not (index $conn "useExistingSecrets")) $password }}
{{- range .Values.postgres.cluster.roles }}
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-login-{{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "unifi-os.standardLabels" $ | nindent 4 }}
type: kubernetes.io/basic-auth
stringData:
  username: {{ .name }}
  password: {{ $password | quote }}
{{- end }}
{{- end }}
{{- end }}
