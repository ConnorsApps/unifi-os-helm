# yaml-language-server: $schema=https://raw.githubusercontent.com/vidispine/hull/refs/heads/main/hull/values.schema.json

# ------------------------------------------------------------------
# Dependencies — PostgreSQL, RabbitMQ
#
# MongoDB runs embedded inside the container (bundled mongod + mongodb.service).
# No external MongoDB configuration is supported or needed.
#
# | Mode     | Subchart | External | What to set |
# |----------|----------|----------|-------------|
# | Postgres | postgres.enabled: true | postgres.enabled: false | connection.host |
# | RabbitMQ | rabbitmq.enabled: true | rabbitmq.enabled: false | connection.host |
#
# Bundled postgres (postgres.enabled: true) uses the CloudNativePG cluster subchart.
# Set connection.password and the chart generates all pg-login-* secrets automatically.
# Set postgres.useExistingSecrets: true to provide your own pg-login-* secrets instead
# (e.g. via ESO/Vault) — secret names are fixed and cannot be changed.
#
# For external postgres (postgres.enabled: false): set connection.host and either
# connection.password or connection.existingSecret.
# global.*.connection overrides chart-local values (umbrella charts).
# ------------------------------------------------------------------
global:
  postgres:
    connection:
      host: ""
      port: 5432
      database: unifi-core
      user: unifi-core
      # password: plaintext password. Chart creates unifi-pg-auth and pg-login-* secrets.
      password: ""
      # useExistingSecrets: when true, chart expects pre-created pg-login-<rolename> secrets
      #   (e.g. from ESO/Vault). Secret names are fixed — see DATABASE.md for the full list.
      #   Mutually exclusive with password. Only applies when postgres.enabled: true.
      useExistingSecrets: false
      # existingSecret: for external postgres (postgres.enabled: false) only.
      #   Provides PGPASSWORD to the app via secretKeyRef.
      existingSecret:
        name: ""
        passwordKey: ""
  rabbitmq:
    connection:
      host: ""
      port: 5672
      username: unifi
      # Required unless existingSecret.name is set
      password: ""
      erlangCookie: ""
      existingSecret:
        name: ""
        passwordKey: ""
        erlangCookieKey: ""
      uri: ""

image:
  repository: "ghcr.io/connorsapps/unifi-os"
  tag: "5.0.6"

hull:
  config:
    general:
      # Keep object keys as-is (no automatic release-name prefixing).
      noObjectNamePrefixes: true
      # Keep explicit fullname override empty when noObjectNamePrefixes is enabled.
      fullnameOverride: ""
    templates:
      pod:
        global:
          # Prevent HULL from trying to create/manage a ServiceAccount named "default"
          # when object name prefixes are disabled.
          serviceAccountName: default
  objects:
    # ------------------------------------------------------------------
    # ConfigMaps
    # ------------------------------------------------------------------
    configmap:
      config-overrides:
        data:
          production.yaml:
            inline: |-
              logs:
                enableConsole: true
          # Go service logging overrides for container stdout/stderr.
          # Service DB settings come from /data/*/ws/config.props DB secrets.
          ulp-go.config.props:
            inline: |-
              log.std = true
              log.redirect_std_output = false
              log.std_to_file.enable = false
          ucs-agent.config.props:
            inline: |-
              log.std = true
              log.redirect_std_output = false
              log.std_to_file.enable = false
          unifi-directory.config.props:
            inline: |-
              log.std = true
              log.redirect_std_output = false
              log.std_to_file.enable = false
          unifi-identity-update.config.props:
            inline: |-
              log.std = true
              log.file = false
              log.redirect_std_output = false
          uid-agent.config.props:
            inline: |-
              log.std = true
              log.redirect_std_output = false
              log.std_to_file.enable = false
          unifi-credential-server.config.props:
            inline: |-
              log.std = true
              log.redirect_std_output = false
              log.std_to_file.enable = false
              identity.device.auth = false
              identity.cloud.env = dev
              identity.support_cloud_token =
              cloud.env = dev
          ucs-user-assets.config.props:
            inline: |-
              identity.cloud.env = dev
              identity.support_cloud_token =
              identity.device.auth = false
              cloud.env = dev
      # ------------------------------------------------------------------
      # Discovery shim sidecar script
      #
      # uos-discovery-client ships as a stub binary that exits immediately,
      # so nothing ever listens on port 11002 (discoveryClientUrl). unifi-core
      # polls that port on a tight setIntervalAsync loop and logs two recurring
      # warnings every few seconds:
      #   [system] Failed to fetch network interfaces from discovery agent
      #   [discovery.client] Error on client scan: ECONNREFUSED 127.0.0.1:11002
      #
      # This shim is a minimal Node.js HTTP server that satisfies those calls:
      #   GET /scan         → [] (no devices — no UDP broadcast in a k8s pod)
      #   GET <anything>    → os.networkInterfaces() in the shape $Je() expects,
      #                       giving unifi-core a chance to resolve its lanIp
      #   HEAD /healthz     → 200 OK
      # ------------------------------------------------------------------
      discovery-shim-script:
        data:
          shim.js:
            inline: |-
              const http = require("http");
              const os = require("os");

              const PORT = Number(process.env.DISCOVERY_SHIM_PORT || 11002);
              const HOST = process.env.DISCOVERY_SHIM_HOST || "0.0.0.0";

              function writeJson(res, statusCode, body) {
                res.statusCode = statusCode;
                res.setHeader("Content-Type", "application/json");
                res.end(JSON.stringify(body));
              }

              const server = http.createServer((req, res) => {
                const method = req.method || "GET";
                const url = req.url || "/";

                if (method === "HEAD" && (url === "/" || url === "/healthz")) {
                  res.statusCode = 200;
                  return res.end();
                }

                if (url.startsWith("/scan")) {
                  // discovery.client scan — no UDP broadcast domain in a k8s pod
                  return writeJson(res, 200, []);
                }

                if (method === "GET") {
                  // unifi-core validates this response with ZodRecord, which expects a
                  // plain object keyed by interface name — exactly what os.networkInterfaces()
                  // returns: { "eth0": [{address, netmask, ...}], "lo": [...] }
                  return writeJson(res, 200, os.networkInterfaces());
                }

                return writeJson(res, 404, {});
              });

              server.listen(PORT, HOST, () => {
                console.log(`discovery-shim listening on ${HOST}:${PORT}`);
              });
      # ------------------------------------------------------------------
      # Backup — non-sensitive config rendered from backup.config values.
      # password and storageUrl are kept in the unifi-backup-secret Secret.
      # ------------------------------------------------------------------
      unifi-backup-config:
        enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.enabled }}
        data:
          config.yaml:
            inline: |
              {{- $cfg := deepCopy .Values.backup.config -}}
              {{- $url := .Values.backup.config.unifi.url | default (printf "https://http.%s.svc.cluster.local" .Release.Namespace) -}}
              {{- $_ := set $cfg.unifi "url" $url -}}
              {{ $cfg | toYaml -}}
    # ------------------------------------------------------------------
    # Services
    # ------------------------------------------------------------------
    service:
      # Device and application communication (inform URL)
      # Useful when backendTLSPolicy is used (unifi lacks https support for inform url)
      http-inform:
        enabled: true
        type: ClusterIP
        selector:
          app.kubernetes.io/component: monolith
        ports:
          inform:
            port: 8080
            protocol: TCP
            name: inform
      # Primary ClusterIP — HTTP/HTTPS application ports consumed by ingress.
      http:
        enabled: true
        type: ClusterIP
        selector:
          app.kubernetes.io/component: monolith
        ports:
          # Default UniFi OS HTTPS site served by unifi-core/nginx.
          # This listener serves /, /manage, /proxy/network, etc.
          https:
            port: 443
            protocol: TCP
            name: https
          # Device and application communication (inform URL)
          inform:
            port: 8080
            protocol: TCP
            name: inform
          # UniFi Network Application GUI/API
          network-app:
            port: 8443
            protocol: TCP
            name: network-app
          # UniFi Identity Hub
          id-hub:
            port: 9543
            protocol: TCP
            name: id-hub
          # Site Supervisor
          site-supervisor:
            port: 11084
            protocol: TCP
            name: site-supervisor
          # UniFi mobile speed test
          speedtest:
            port: 6789
            protocol: TCP
            name: speedtest
          # Secure Hotspot portal
          hotspot-secure:
            port: 8444
            protocol: TCP
            name: hotspot-secure
          # RTP control
          rtp:
            port: 5005
            protocol: TCP
            name: rtp
      # Hotspot portal redirect ports — separate service so they can be
      # mapped through the ingress TCP config independently.
      hotspot:
        enabled: true
        type: ClusterIP
        selector:
          app.kubernetes.io/component: monolith
        ports:
          redirect-0:
            port: 8880
            protocol: TCP
            name: redirect-0
          redirect-1:
            port: 8881
            protocol: TCP
            name: redirect-1
          redirect-2:
            port: 8882
            protocol: TCP
            name: redirect-2
      # UDP ports — expose these through your cluster edge (Gateway API,
      # ingress controller TCP/UDP mappings, LoadBalancer, or NodePort).
      udp:
        enabled: true
        type: ClusterIP
        selector:
          app.kubernetes.io/component: monolith
        ports:
          # STUN — required for device adoption and Remote Management
          stun:
            port: 3478
            protocol: UDP
            name: stun
          # Remote syslog capture
          syslog:
            port: 5514
            protocol: UDP
            name: syslog
          # Device discovery during adoption
          discovery:
            port: 10003
            protocol: UDP
            name: discovery
      # Metrics endpoint for the optional UniFi exporter.
      unifi-exporter:
        enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.enabled }}
        type: ClusterIP
        selector:
          app.kubernetes.io/component: unifi-exporter
        ports:
          metrics:
            port: 9130
            targetPort: metrics
            name: metrics
            protocol: TCP
    # ------------------------------------------------------------------
    # Gateway API / Istio routing objects
    # ------------------------------------------------------------------
    httproute:
      unifi-inform:
        enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.httpRouteInform.enabled }}
        hostnames: _HT!{{ list (index . "PARENT_CONTEXT").Values.unifi.gateway.httpRouteInform.hostname }}
        parentRefs:
          private:
            kind: Gateway
            name: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.parentRef.name }}
            namespace: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.parentRef.namespace }}
            sectionName: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.httpRouteInform.sectionName }}
        rules:
          default:
            backendRefs:
              http-inform:
                name: http-inform
                port: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.httpRouteInform.backendPort }}
            matches:
              inform:
                path:
                  type: PathPrefix
                  value: /inform
      unifi-https:
        enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.httpRoute.enabled }}
        hostnames: _HT!{{ list (index . "PARENT_CONTEXT").Values.unifi.gateway.httpRoute.hostname }}
        parentRefs:
          private:
            kind: Gateway
            name: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.parentRef.name }}
            namespace: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.parentRef.namespace }}
            sectionName: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.httpRoute.sectionName }}
        rules:
          default:
            backendRefs:
              http:
                name: http
                port: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.httpRoute.backendPort }}
    tcproute:
      unifi-http-8080:
        enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.tcpRoute.enabled }}
        parentRefs:
          private:
            kind: Gateway
            name: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.parentRef.name }}
            namespace: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.parentRef.namespace }}
            sectionName: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.tcpRoute.sectionName }}
        rules:
          default:
            backendRefs:
              http:
                name: http
                port: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.tcpRoute.backendPort }}
    udproute:
      unifi-ap-discovery:
        enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.udpRoutes.discovery.enabled }}
        parentRefs:
          private:
            kind: Gateway
            name: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.parentRef.name }}
            namespace: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.parentRef.namespace }}
            sectionName: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.udpRoutes.discovery.sectionName }}
        rules:
          default:
            backendRefs:
              udp:
                name: udp
                port: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.udpRoutes.discovery.backendPort }}
      unifi-stun:
        enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.udpRoutes.stun.enabled }}
        parentRefs:
          private:
            kind: Gateway
            name: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.parentRef.name }}
            namespace: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.parentRef.namespace }}
            sectionName: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.udpRoutes.stun.sectionName }}
        rules:
          default:
            backendRefs:
              udp:
                name: udp
                port: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.udpRoutes.stun.backendPort }}
      unifi-remote-syslog:
        enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.udpRoutes.syslog.enabled }}
        parentRefs:
          private:
            kind: Gateway
            name: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.parentRef.name }}
            namespace: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.parentRef.namespace }}
            sectionName: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.udpRoutes.syslog.sectionName }}
        rules:
          default:
            backendRefs:
              udp:
                name: udp
                port: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.gateway.udpRoutes.syslog.backendPort }}
    customresource:
      unifi-tls:
        enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.istio.destinationRule.enabled }}
        apiVersion: networking.istio.io/v1
        kind: DestinationRule
        spec:
          host: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.istio.destinationRule.host }}
          trafficPolicy:
            portLevelSettings:
              - port:
                  number: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.istio.destinationRule.port }}
                tls:
                  mode: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.istio.destinationRule.tls.mode }}
                  insecureSkipVerify: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.istio.destinationRule.tls.insecureSkipVerify }}
    # ------------------------------------------------------------------
    # ServiceMonitor — opt-in Prometheus scrape config for UniFi exporter.
    # Requires the Prometheus Operator CRDs to be installed.
    # ------------------------------------------------------------------
    servicemonitor:
      unifi-exporter:
        enabled: _HT!{{ and ((index . "PARENT_CONTEXT").Values.unifiExporter.enabled) ((index . "PARENT_CONTEXT").Values.unifiExporter.serviceMonitor.enabled) }}
        selector:
          matchLabels:
            app.kubernetes.io/component: unifi-exporter
        endpoints:
          - port: metrics
            path: /metrics
            interval: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.serviceMonitor.interval | quote }}
            scrapeTimeout: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.serviceMonitor.scrapeTimeout | quote }}
    # ------------------------------------------------------------------
    # Secrets
    # ------------------------------------------------------------------
    secret:
      rabbitmq-auth:
        enabled: _HT!{{ not (include "unifi-os.rabbitmqUseExistingSecret" (index . "PARENT_CONTEXT") | trim) }}
        staticName: true
        metadataNameOverride: rabbitmq-auth
        type: Opaque
        stringData:
          password: _HT!{{ include "unifi-os.rabbitmqPassword" (index . "PARENT_CONTEXT") }}
          erlang-cookie: _HT!{{ include "unifi-os.rabbitmqErlangCookie" (index . "PARENT_CONTEXT") }}
      unifi-pg-auth:
        enabled: _HT!{{ not (include "unifi-os.postgresUseExistingSecret" (index . "PARENT_CONTEXT") | trim) }}
        staticName: true
        type: kubernetes.io/basic-auth
        stringData:
          username: unifi-core
          password: _HT!{{ include "unifi-os.postgresPassword" (index . "PARENT_CONTEXT") }}
      # Backup credentials — created only when backup.existingSecret.name is not set.
      unifi-backup-secret:
        enabled: _HT!{{ and ((index . "PARENT_CONTEXT").Values.backup.enabled) (not ((index . "PARENT_CONTEXT").Values.backup.existingSecret.name)) }}
        type: Opaque
        stringData:
          password: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.password }}
          storageUrl: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.storageUrl }}
      # Exporter credentials — created only when unifiExporter.existingSecret.name is not set.
      unifi-exporter-secret:
        enabled: _HT!{{ and ((index . "PARENT_CONTEXT").Values.unifiExporter.enabled) (not ((index . "PARENT_CONTEXT").Values.unifiExporter.existingSecret.name)) }}
        type: Opaque
        stringData:
          password: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.password }}
          api-key: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.apiKey }}
    # ------------------------------------------------------------------
    # StatefulSet — single-container systemd runtime (Postgres/RMQ external; Mongo embedded).
    # ------------------------------------------------------------------
    statefulset:
      monolith:
        enabled: true
        replicas: 1
        volumeClaimTemplates:
          - metadata:
              name: persistent
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.storage.statefulset.storageClassName | quote }}
              resources:
                requests:
                  storage: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.storage.statefulset.sizes.persistent | quote }}
          - metadata:
              name: data
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.storage.statefulset.storageClassName | quote }}
              resources:
                requests:
                  storage: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.storage.statefulset.sizes.data | quote }}
          - metadata:
              name: srv
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.storage.statefulset.storageClassName | quote }}
              resources:
                requests:
                  storage: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.storage.statefulset.sizes.srv | quote }}
          - metadata:
              name: unifi
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.storage.statefulset.storageClassName | quote }}
              resources:
                requests:
                  storage: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.storage.statefulset.sizes.unifi | quote }}
          - metadata:
              name: log
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.storage.statefulset.storageClassName | quote }}
              resources:
                requests:
                  storage: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.storage.statefulset.sizes.log | quote }}
          - metadata:
              name: mongodb
            spec:
              accessModes: [ReadWriteOnce]
              storageClassName: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.storage.statefulset.storageClassName | quote }}
              resources:
                requests:
                  storage: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.storage.statefulset.sizes.mongodb | quote }}
        pod:
          securityContext: {}
          volumes:
            run:
              emptyDir:
                medium: Memory
            run-lock:
              emptyDir:
                medium: Memory
            cgroup:
              hostPath:
                path: /sys/fs/cgroup
                type: Directory
            override-config-secrets:
              projected:
                sources:
                  - secret:
                      name: postgres-unifi-core-override
                      optional: true
                      items:
                        - key: local.yaml
                          path: unifi-core/local.yaml
                  - configMap:
                      name: config-overrides
                      items:
                        - key: production.yaml
                          path: unifi-core/production.yaml
                        - key: ulp-go.config.props
                          path: ulp-go/logging.config.props
                        - key: unifi-credential-server.config.props
                          path: unifi-credential-server/logging.config.props
                        - key: ucs-user-assets.config.props
                          path: ucs-user-assets/logging.config.props
                        - key: unifi-directory.config.props
                          path: unifi-directory/logging.config.props
                        - key: ucs-agent.config.props
                          path: ucs-agent/logging.config.props
                        - key: unifi-identity-update.config.props
                          path: unifi-identity-update/logging.config.props
                        - key: uid-agent.config.props
                          path: uid/logging.config.props
                  - secret:
                      name: config-override-secret-ulp-go
                      optional: true
                      items:
                        - key: config.props
                          path: ulp-go/db.config.props
                  - secret:
                      name: config-override-secret-unifi-credential-server
                      optional: true
                      items:
                        - key: config.props
                          path: unifi-credential-server/db.config.props
                  - secret:
                      name: config-override-secret-ucs-user-assets
                      optional: true
                      items:
                        - key: config.props
                          path: ucs-user-assets/db.config.props
                  - secret:
                      name: config-override-secret-unifi-directory
                      optional: true
                      items:
                        - key: config.props
                          path: unifi-directory/db.config.props
                  - secret:
                      name: config-override-secret-ucs-agent
                      optional: true
                      items:
                        - key: config.props
                          path: ucs-agent/db.config.props
                  - secret:
                      name: config-override-secret-unifi-identity-update
                      optional: true
                      items:
                        - key: config.props
                          path: unifi-identity-update/db.config.props
                  - secret:
                      name: config-override-secret-uid-agent
                      optional: true
                      items:
                        - key: config.props
                          path: uid/db.config.props
            discovery-shim-script:
              configMap:
                name: discovery-shim-script
                defaultMode: 0755
            postgres-superuser-auth:
              enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.postgres.enabled }}
              secret:
                secretName: _HT!{{ printf "%s-superuser" ((index . "PARENT_CONTEXT").Values.postgres.fullnameOverride | default "unifi-postgres") }}
            unifi-tls-secret:
              enabled: _HT!{{ ne (include "unifi-os.unifiTLSSecretName" (index . "PARENT_CONTEXT")) "" }}
              secret:
                secretName: _HT!{{ include "unifi-os.unifiTLSSecretName" (index . "PARENT_CONTEXT") }}
          initContainers:
            wait-postgres:
              enabled: true
              image:
                repository: busybox
              env:
                PGHOST:
                  value: _HT!{{ include "unifi-os.postgresHost" (index . "PARENT_CONTEXT") }}
                PGPORT:
                  value: "5432"
              command:
                - sh
                - -c
                - until nc -z -w 2 "$PGHOST" "${PGPORT:-5432}"; do sleep 2; done
            init:
              image:
                repository: _HT!{{ (index . "PARENT_CONTEXT").Values.image.repository | quote }}
                tag: _HT!{{ (index . "PARENT_CONTEXT").Values.image.tag | quote }}
              env:
                UOS_UUID:
                  value: "3403e723-3f5b-5a1e-9b88-ed7e2fcfd762"
                PGHOST:
                  value: _HT!{{ include "unifi-os.postgresHost" (index . "PARENT_CONTEXT") }}
                PGPORT:
                  value: _HT!{{ include "unifi-os.postgresPort" (index . "PARENT_CONTEXT") | quote }}
                PGDATABASE:
                  value: _HT!{{ include "unifi-os.postgresDatabase" (index . "PARENT_CONTEXT") }}
                PGUSER:
                  value: _HT!{{ include "unifi-os.postgresUser" (index . "PARENT_CONTEXT") }}
                PGPASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: _HT!{{ include "unifi-os.postgresSecretName" (index . "PARENT_CONTEXT") }}
                      key: _HT!{{ include "unifi-os.postgresSecretPasswordKey" (index . "PARENT_CONTEXT") }}
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  export USER=unifi-core GROUP=unifi-core
                  /usr/share/unifi-core/app/hooks/pre-start 2>/dev/null || true
                  mkdir -p \
                    /data/unifi-core/config/http \
                    /data/unifi-core/config/overrides \
                    /data/unifi-core/logs \
                    /data/ulp-go/ws \
                    /data/unifi-credential-server/ws \
                    /data/unifi-directory/ws \
                    /data/ucs-agent/ws \
                    /data/uid/ws \
                    /data/unifi-identity-update/ws \
                    /data/ucs-user-assets/ws \
                    /srv/unifi-core \
                    /persistent
                  _tls_dir=/data/unifi-core/config
                  _tls_crt="${_tls_dir}/unifi-core.crt"
                  _tls_key="${_tls_dir}/unifi-core.key"
                  _tls_ca="${_tls_dir}/unifi-core-ca.crt"
                  if [ -f /run/secrets/tls/tls.crt ] && [ -f /run/secrets/tls/tls.key ]; then
                    cp /run/secrets/tls/tls.crt "${_tls_crt}"
                    cp /run/secrets/tls/tls.key "${_tls_key}"
                    [ -f /run/secrets/tls/ca.crt ] && cp /run/secrets/tls/ca.crt "${_tls_ca}" || cp "${_tls_crt}" "${_tls_ca}"
                    chown "$USER:$GROUP" "${_tls_crt}" "${_tls_key}" "${_tls_ca}" 2>/dev/null || true
                    chmod 600 "${_tls_key}" 2>/dev/null || true
                  fi
                  if [ ! -s "${_tls_crt}" ] || [ ! -s "${_tls_key}" ]; then
                    rm -f "${_tls_crt}" "${_tls_key}"
                    openssl req -x509 -newkey rsa:2048 -nodes \
                      -keyout "${_tls_key}" \
                      -out "${_tls_crt}" \
                      -days 3650 \
                      -subj "/CN=unifi.local" >/dev/null 2>&1 || true
                    [ -s "${_tls_crt}" ] && [ ! -s "${_tls_ca}" ] && cp "${_tls_crt}" "${_tls_ca}" || true
                    chown "$USER:$GROUP" "${_tls_crt}" "${_tls_key}" "${_tls_ca}" 2>/dev/null || true
                    chmod 600 "${_tls_key}" 2>/dev/null || true
                  fi
                  # Copy overrides from read-only projected secrets into writable /data.
                  # Service pre-start scripts chown these files, so they cannot stay read-only mounts.
                  # When existingSecret is configured, the projected secrets are absent; configs are
                  # generated from PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD env vars instead.
                  if [ -f /run/secrets/overrides/unifi-core/local.yaml ]; then
                    cp /run/secrets/overrides/unifi-core/local.yaml /data/unifi-core/config/overrides/local.yaml
                    chown "$USER:$GROUP" /data/unifi-core/config/overrides/local.yaml 2>/dev/null || true
                  elif [ -n "${PGHOST}" ] && [ -n "${PGPASSWORD}" ]; then
                    printf 'postgres:\n  host: %s\n  port: %s\n  database: %s\n  user: %s\n  password: "%s"\n' \
                      "${PGHOST}" "${PGPORT:-5432}" "${PGDATABASE:-unifi-core}" "${PGUSER:-unifi-core}" "${PGPASSWORD}" \
                      > /data/unifi-core/config/overrides/local.yaml
                    chown "$USER:$GROUP" /data/unifi-core/config/overrides/local.yaml 2>/dev/null || true
                  fi
                  if [ -f /run/secrets/overrides/unifi-core/production.yaml ]; then
                    cp /run/secrets/overrides/unifi-core/production.yaml /data/unifi-core/config/overrides/production.yaml
                    chown "$USER:$GROUP" /data/unifi-core/config/overrides/production.yaml 2>/dev/null || true
                  fi
                  for _entry in \
                    "ulp-go|ulp-go|ulp-go|/data/ulp-go/ws/config.props" \
                    "unifi-credential-server|unifi-credential-server|unifi-credential-server|/data/unifi-credential-server/ws/config.props" \
                    "ucs-user-assets|ucs-user-assets|unifi-credential-server|/data/ucs-user-assets/ws/config.props" \
                    "unifi-directory|unifi-directory|unifi-directory|/data/unifi-directory/ws/config.props" \
                    "ucs-agent|ucs-agent|ucs-agent|/data/ucs-agent/ws/config.props" \
                    "unifi-identity-update|unifi-identity-update|unifi-identity-update|/data/unifi-identity-update/ws/config.props" \
                    "uid|uid|uid|/data/uid/ws/config.props"; do
                    _svc="${_entry%%|*}"; _r="${_entry#*|}"
                    _db_name="${_r%%|*}"; _r="${_r#*|}"
                    _db_user="${_r%%|*}"; _dst="${_r#*|}"
                    _db_src="/run/secrets/overrides/${_svc}/db.config.props"
                    _log_src="/run/secrets/overrides/${_svc}/logging.config.props"
                    if [ -f "${_db_src}" ]; then
                      cp "${_db_src}" "${_dst}"
                    elif [ -n "${PGHOST}" ] && [ -n "${PGPASSWORD}" ]; then
                      printf 'db.name = %s\ndb.host = %s\ndb.port = %s\ndb.encrypted = false\ndb.username = %s\ndb.password = %s\n' \
                        "${_db_name}" "${PGHOST}" "${PGPORT:-5432}" "${_db_user}" "${PGPASSWORD}" \
                        > "${_dst}"
                    fi
                    if [ -f "${_log_src}" ]; then
                      [ -f "${_dst}" ] && printf '\n' >> "${_dst}" || true
                      cat "${_log_src}" >> "${_dst}"
                    fi
                    [ -f "${_dst}" ] && chown "$USER:$GROUP" "${_dst}" 2>/dev/null || true
                  done
                  [ -n "${UOS_UUID}" ] && [ ! -f /data/uos_uuid ] && echo "${UOS_UUID}" > /data/uos_uuid || true
                  cp /usr/share/unifi-core/http/ssl-nist.conf /data/unifi-core/config/http/ssl-dynamic.conf || true
              volumeMounts:
                data:
                  name: data
                  mountPath: /data
                srv:
                  name: srv
                  mountPath: /srv
                persistent:
                  name: persistent
                  mountPath: /persistent
                override-config-secrets:
                  name: override-config-secrets
                  mountPath: /run/secrets/overrides
                  readOnly: true
                unifi-tls-secret:
                  enabled: _HT!{{ ne (include "unifi-os.unifiTLSSecretName" (index . "PARENT_CONTEXT")) "" }}
                  name: unifi-tls-secret
                  mountPath: /run/secrets/tls
                  readOnly: true
          containers:
            unifi-os:
              image:
                repository: _HT!{{ (index . "PARENT_CONTEXT").Values.image.repository | quote }}
                tag: _HT!{{ (index . "PARENT_CONTEXT").Values.image.tag | quote }}
              imagePullPolicy: Always
              securityContext:
                privileged: true
                runAsUser: 0
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  # Set global Postgres env for systemd-managed services that rely on libpq defaults.
                  mkdir -p /etc/systemd/system.conf.d
                  cat >/etc/systemd/system.conf.d/10-postgres-env.conf <<EOF
                  [Manager]
                  DefaultEnvironment=PGHOST=${PGHOST} PGPORT=${PGPORT}
                  EOF
                  # Wrapper scripts and unit stubs are baked into the image.
                  mkdir -p /var/log/nginx
                  mkdir -p /var/lib/unifi
                  cat >/var/lib/unifi/env-overrides <<EOF
                  UNIFI_MQ_ENABLED=true
                  RABBITMQ_URI=${RABBITMQ_URI}
                  EOF
                  # MongoDB runs embedded via the bundled mongodb.service unit.
                  # No db_uri override needed — UniFi Network uses localhost by default.
                  # Run systemd as PID 1 so bundled UniFi services are managed
                  # by their native unit files inside the monolith container.
                  exec /sbin/init
              env:
                UOS_SYSTEM_IP:
                  value: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.uosSystemIP | default "" }}
                PGHOST:
                  value: _HT!{{ include "unifi-os.postgresHost" (index . "PARENT_CONTEXT") }}
                PGPORT:
                  value: _HT!{{ include "unifi-os.postgresPort" (index . "PARENT_CONTEXT") }}
                RABBITMQ_PASSWORD:
                  valueFrom:
                    secretKeyRef:
                      name: _HT!{{ include "unifi-os.rabbitmqSecretName" (index . "PARENT_CONTEXT") }}
                      key: _HT!{{ include "unifi-os.rabbitmqSecretPasswordKey" (index . "PARENT_CONTEXT") }}
                RABBITMQ_URI:
                  value: _HT!{{ include "unifi-os.rabbitmqURI" (index . "PARENT_CONTEXT") }}
              ports:
                inform:
                  containerPort: 8080
                  protocol: TCP
                network-app:
                  containerPort: 8443
                  protocol: TCP
                id-hub:
                  containerPort: 9543
                  protocol: TCP
                site-supervisor:
                  containerPort: 11084
                  protocol: TCP
                speedtest:
                  containerPort: 6789
                  protocol: TCP
                hotspot-secure:
                  containerPort: 8444
                  protocol: TCP
                rtp:
                  containerPort: 5005
                  protocol: TCP
                redirect-0:
                  containerPort: 8880
                  protocol: TCP
                redirect-1:
                  containerPort: 8881
                  protocol: TCP
                redirect-2:
                  containerPort: 8882
                  protocol: TCP
                stun:
                  containerPort: 3478
                  protocol: UDP
                syslog:
                  containerPort: 5514
                  protocol: UDP
                discovery:
                  containerPort: 10003
                  protocol: UDP
              readinessProbe:
                httpGet:
                  scheme: HTTPS
                  path: /
                  port: 443
                initialDelaySeconds: 90
                periodSeconds: 15
                timeoutSeconds: 5
                successThreshold: 1
                failureThreshold: 6
              livenessProbe:
                httpGet:
                  scheme: HTTPS
                  path: /
                  port: 443
                initialDelaySeconds: 180
                periodSeconds: 20
                timeoutSeconds: 5
                successThreshold: 1
                failureThreshold: 6
              volumeMounts:
                data:
                  name: data
                  mountPath: /data
                srv:
                  name: srv
                  mountPath: /srv
                unifi:
                  name: unifi
                  mountPath: /var/lib/unifi
                mongodb:
                  name: mongodb
                  mountPath: /var/lib/mongodb
                log:
                  name: log
                  mountPath: /var/log
                persistent:
                  name: persistent
                  mountPath: /persistent
                run:
                  name: run
                  mountPath: /run
                run-lock:
                  name: run-lock
                  mountPath: /run/lock
                cgroup:
                  name: cgroup
                  mountPath: /sys/fs/cgroup
                postgres-superuser-auth:
                  enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.postgres.enabled }}
                  name: postgres-superuser-auth
                  mountPath: /run/secrets/postgres-superuser/pgpass
                  subPath: pgpass
                  readOnly: true
              resources:
                requests:
                  cpu: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.resources.requests.cpu | quote }}
                  memory: _HT!{{ (index . "PARENT_CONTEXT").Values.unifi.resources.requests.memory | quote }}
                limits: _HT!{{ $l := (index . "PARENT_CONTEXT").Values.unifi.resources.limits }}{{ if $l.cpu }}{{ dict "memory" $l.memory "cpu" $l.cpu | toJson }}{{ else }}{{ dict "memory" $l.memory | toJson }}{{ end }}
            journalctl:
              image:
                repository: _HT!{{ (index . "PARENT_CONTEXT").Values.image.repository | quote }}
                tag: _HT!{{ (index . "PARENT_CONTEXT").Values.image.tag | quote }}
              imagePullPolicy: Always
              securityContext:
                runAsUser: 0
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  # Wait for systemd to create journal files in shared volumes.
                  # Without this, the sidecar can crash with "No journal files were found."
                  while ! compgen -G "/run/log/journal/*/*.journal" > /dev/null \
                    && ! compgen -G "/var/log/journal/*/*.journal" > /dev/null; do
                    sleep 2
                  done
                  journal_dirs=()
                  [ -d /run/log/journal ] && journal_dirs+=(--directory=/run/log/journal)
                  [ -d /var/log/journal ] && journal_dirs+=(--directory=/var/log/journal)
                  # Read all available journal files (including foreign machine-id dirs)
                  # and follow new entries for kubectl logs -c journalctl.
                  exec journalctl -f -o short-iso --no-pager --merge "${journal_dirs[@]}" | cut -c 27-
              volumeMounts:
                run:
                  name: run
                  mountPath: /run
                log:
                  name: log
                  mountPath: /var/log
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
            discovery-shim:
              image:
                repository: node
                tag: "24-alpine"
              imagePullPolicy: IfNotPresent
              command:
                - node
                - --watch
                - /scripts/shim.js
              volumeMounts:
                discovery-shim-script:
                  name: discovery-shim-script
                  mountPath: /scripts
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi

    # ------------------------------------------------------------------
    # UniFi Exporter Deployment — https://github.com/unpoller/unpoller
    # ------------------------------------------------------------------
    deployment:
      unifi-exporter:
        enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.enabled }}
        replicas: 1
        pod:
          containers:
            main:
              image:
                repository: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.image.repository | quote }}
                tag: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.image.tag | quote }}
              imagePullPolicy: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.image.pullPolicy | quote }}
              ports:
                metrics:
                  containerPort: 9130
                  protocol: TCP
              env:
                UP_UNIFI_DEFAULT_URL:
                  value: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.url | default (printf "https://http.%s.svc.cluster.local" ((index . "PARENT_CONTEXT").Release.Namespace)) | quote }}
                UP_UNIFI_DEFAULT_USER:
                  value: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.username | quote }}
                UP_UNIFI_DEFAULT_PASS:
                  valueFrom:
                    secretKeyRef:
                      name: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.existingSecret.name | default "unifi-exporter-secret" }}
                      key: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.existingSecret.passwordKey | quote }}
                      optional: true
                UP_UNIFI_DEFAULT_API_KEY:
                  valueFrom:
                    secretKeyRef:
                      name: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.existingSecret.name | default "unifi-exporter-secret" }}
                      key: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.existingSecret.apiKeyKey | quote }}
                      optional: true
                UP_PROMETHEUS_DISABLE:
                  value: "false"
                UP_UNIFI_DEFAULT_VERIFY_SSL:
                  value: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.verifyTLS | toString | quote }}
                UP_INFLUXDB_DISABLE:
                  value: "true"
                UP_UNIFI_DEFAULT_SAVE_SITES:
                  value: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.saveSites | toString | quote }}
                UP_UNIFI_DEFAULT_SAVE_DPI:
                  value: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.saveDpi | toString | quote }}
                UP_UNIFI_DEFAULT_SAVE_EVENTS:
                  value: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.saveEvents | toString | quote }}
                UP_UNIFI_DEFAULT_SAVE_ALARMS:
                  value: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.saveAlarms | toString | quote }}
                UP_UNIFI_DEFAULT_SAVE_ANOMALIES:
                  value: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.saveAnomalies | toString | quote }}
                UP_UNIFI_DEFAULT_SAVE_IDS:
                  value: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.saveIds | toString | quote }}
                UP_UNIFI_DEFAULT_HASH_PII:
                  value: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.hashPii | toString | quote }}
                UP_PROMETHEUS_REPORT_ERRORS:
                  value: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.config.reportErrors | toString | quote }}
              resources:
                requests:
                  cpu: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.resources.requests.cpu | quote }}
                  memory: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.resources.requests.memory | quote }}
                limits:
                  cpu: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.resources.limits.cpu | quote }}
                  memory: _HT!{{ (index . "PARENT_CONTEXT").Values.unifiExporter.resources.limits.memory | quote }}
              livenessProbe:
                httpGet:
                  path: /
                  port: metrics
                initialDelaySeconds: 30
                periodSeconds: 10
                timeoutSeconds: 5
                failureThreshold: 3
              readinessProbe:
                httpGet:
                  path: /
                  port: metrics
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 3
    # ------------------------------------------------------------------
    # Backup CronJob — https://github.com/ConnorsApps/unifi-backup
    # ------------------------------------------------------------------
    cronjob:
      unifi-backup:
        enabled: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.enabled }}
        schedule: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.schedule | quote }}
        successfulJobsHistoryLimit: 3
        failedJobsHistoryLimit: 3
        concurrencyPolicy: Forbid
        job:
          pod:
            restartPolicy: OnFailure
            containers:
              backup:
                image:
                  repository: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.image.repository | quote }}
                  tag: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.image.tag | quote }}
                imagePullPolicy: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.image.pullPolicy | quote }}
                args:
                  - "-config"
                  - "/config/config.yaml"
                env:
                  UNIFI_PASS:
                    valueFrom:
                      secretKeyRef:
                        name: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.existingSecret.name | default "unifi-backup-secret" }}
                        key: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.existingSecret.passwordKey }}
                  UNIFI_USER:
                    value: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.username }}
                  STORAGE_URL:
                    valueFrom:
                      secretKeyRef:
                        name: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.existingSecret.name | default "unifi-backup-secret" }}
                        key: _HT!{{ (index . "PARENT_CONTEXT").Values.backup.existingSecret.storageUrlKey }}
                volumeMounts:
                  config:
                    name: config
                    mountPath: /config
                    readOnly: true
                resources:
                  requests:
                    memory: "64Mi"
                    cpu: "100m"
                  limits:
                    memory: "256Mi"
            volumes:
              config:
                configMap:
                  name: unifi-backup-config

# ------------------------------------------------------------------
# Backup — uses https://github.com/ConnorsApps/unifi-backup
# Requires a Local UniFi OS user with Administrator role.
# See https://github.com/ConnorsApps/unifi-backup/blob/main/CONFIGURATION.md
# ------------------------------------------------------------------
backup:
  enabled: false

  schedule: "0 2 * * *"

  image:
    repository: ghcr.io/connorsapps/unifi-backup
    tag: latest
    pullPolicy: IfNotPresent

  # Password for the backup UniFi OS local user (Administrator role required).
  # Set in values.env.yaml. Ignored when existingSecret.name is set.
  password: ""

  username: backup

  # Storage backend URL — kept as a Secret because it often contains credentials.
  # Injected as STORAGE_URL env var (takes priority over config file).
  # See https://github.com/ConnorsApps/unifi-backup/blob/main/CONFIGURATION.md
  # Examples:
  #   file://./backups
  #   smb://user:pass@nas.local/share
  #   s3://my-bucket?region=us-east-1
  storageUrl: "file://./backups"

  # Reference a pre-existing Secret instead of creating one from password/storageUrl above.
  # Secret must contain the keys specified by *Key fields.
  existingSecret:
    name: ""
    passwordKey: password
    storageUrlKey: storageUrl

  # Non-sensitive backup configuration — rendered as config.yaml in a ConfigMap.
  # Docs: https://github.com/ConnorsApps/unifi-backup/blob/main/examples/config.example.yaml
  #       https://github.com/ConnorsApps/unifi-backup/blob/main/CONFIGURATION.md
  config:
    # yaml-language-server: $schema=https://raw.githubusercontent.com/ConnorsApps/unifi-backup/refs/heads/main/config.schema.json
    unifi:
      # Leave empty to auto-use the cluster-local service address:
      # https://http.<namespace>.svc.cluster.local
      url: ""
      site: default
      includeDays: 0
      insecure_skip_verify: true
      timeout: 10m
      max_retries: 3
    logging:
      level: info
      format: json
    retention:
      keepLast: 14

# ------------------------------------------------------------------
# UniFi Exporter — uses https://github.com/unpoller/unpoller
# Scrapes metrics from UniFi OS and exposes them for Prometheus.
# Auth: API key (config.apiKey), username+password (config.username/password),
# or a pre-existing Secret (existingSecret.name). API key takes priority when non-empty.
# ------------------------------------------------------------------
unifiExporter:
  enabled: false

  image:
    repository: ghcr.io/unpoller/unpoller
    tag: "v2.34.0"
    pullPolicy: IfNotPresent

  config:
    # UniFi OS controller URL.
    # Leave empty to auto-derive: https://http.<namespace>.svc.cluster.local
    url: ""
    username: ""
    # Ignored when existingSecret.name is set.
    password: ""
    # API key authentication (UniFi OS 4+). Takes precedence over username/password when non-empty.
    # Ignored when existingSecret.name is set.
    apiKey: ""
    verifyTLS: false
    saveSites: true
    saveDpi: true
    saveEvents: false
    saveAlarms: false
    saveAnomalies: false
    saveIds: false
    hashPii: false
    reportErrors: true

  # Reference a pre-existing Secret instead of creating one from config.password/apiKey above.
  existingSecret:
    name: ""
    passwordKey: password
    apiKeyKey: api-key

  serviceMonitor:
    # Requires the Prometheus Operator CRDs to be installed.
    enabled: false
    interval: 30s
    scrapeTimeout: 10s

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ------------------------------------------------------------------
# RabbitMQ
# ------------------------------------------------------------------
rabbitmq:
  enabled: true
  connection: {} # Optional overrides only; defaults in global.rabbitmq.connection
  # Prevent fsGroup from adding group-read permissions to the Erlang cookie file.
  # RabbitMQ / Erlang requires .erlang.cookie to be mode 0400 (owner-only).
  podSecurityContext:
    fsGroup: 999
    fsGroupChangePolicy: OnRootMismatch
  # When global.rabbitmq.connection.password is set, this chart creates "rabbitmq-auth" and the
  # subchart reads from it. When global.rabbitmq.connection.existingSecret.name is set instead,
  # "rabbitmq-auth" is NOT created — you must override auth.existingSecret/existingPasswordKey/
  # existingErlangCookieKey here (or in your values file) to point at your secret.
  # HULL _HT! cannot reach subchart pass-through values, so this cannot be done automatically.
  auth:
    enabled: true
    username: "unifi"
    existingSecret: "rabbitmq-auth"
    # CloudPirates RabbitMQ uses existingPasswordKey (not existingSecretPasswordKey).
    existingPasswordKey: password
    existingErlangCookieKey: erlang-cookie
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ------------------------------------------------------------------
# PostgreSQL — CloudNativePG subchart
#
# Two credential modes for bundled CNPG (postgres.enabled: true):
#
#   useExistingSecrets: false (default)
#     Set global.postgres.connection.password. The chart generates pg-login-<rolename>
#     secrets and unifi-pg-auth automatically.
#
#   useExistingSecrets: true
#     Create pg-login-<rolename> secrets yourself before installing (e.g. via ESO/Vault).
#     Secret names are fixed — pg-login-unifi-core, pg-login-ulp-go, etc.
#     Each must be type kubernetes.io/basic-auth with username and password keys.
#
# For external postgres (postgres.enabled: false), set connection.host and either
# connection.password or connection.existingSecret.
# ------------------------------------------------------------------
postgres:
  enabled: false
  connection: {} # Optional overrides only; defaults in global.postgres.connection
  fullnameOverride: unifi-postgres
  cluster:
    instances: 1
    imageName: "ghcr.io/cloudnative-pg/postgresql:14-bookworm"
    storage:
      size: 10Gi
      storageClass: ""
    initdb:
      database: unifi-core
      owner: unifi-core
      secret:
        name: pg-login-unifi-core
    roles:
      - name: unifi-core
        ensure: present
        login: true
        createdb: true
        passwordSecret:
          name: pg-login-unifi-core
      - name: ulp-go
        ensure: present
        login: true
        createdb: true
        passwordSecret:
          name: pg-login-ulp-go
      - name: uid
        ensure: present
        login: true
        createdb: true
        passwordSecret:
          name: pg-login-uid
      - name: unifi-credential-server
        ensure: present
        login: true
        createdb: true
        passwordSecret:
          name: pg-login-unifi-credential-server
      - name: unifi-directory
        ensure: present
        login: true
        createdb: true
        passwordSecret:
          name: pg-login-unifi-directory
      - name: ucs-agent
        ensure: present
        login: true
        createdb: true
        passwordSecret:
          name: pg-login-ucs-agent
      - name: ucs-update
        ensure: present
        login: true
        createdb: true
        passwordSecret:
          name: pg-login-ucs-update
      - name: unifi-identity-update
        ensure: present
        login: true
        createdb: true
        passwordSecret:
          name: pg-login-unifi-identity-update
  databases:
    - name: unifi-core
      owner: unifi-core
    - name: ulp-go
      owner: ulp-go
    - name: uid
      owner: uid
    - name: unifi-credential-server
      owner: unifi-credential-server
    - name: ucs-user-assets
      owner: unifi-credential-server
    - name: unifi-directory
      owner: unifi-directory
    - name: ucs-agent
      owner: ucs-agent
    - name: unifi-identity-update
      owner: ucs-update

# ------------------------------------------------------------------
# UniFi
# ------------------------------------------------------------------
unifi:
  tls:
    # Name of an existing kubernetes.io/tls secret to use for UniFi's nginx.
    # The secret must have tls.crt and tls.key keys; ca.crt is optional.
    # Ignored when certManager.enabled — the cert-manager secret is used instead.
    existingSecret: ""
    certManager:
      enabled: false
      # Name of the Secret cert-manager will create. Also used for the volume mount.
      secretName: unifi-tls
      issuerRef:
        name: ""               # required
        kind: ClusterIssuer    # or Issuer
        group: cert-manager.io
      # dnsNames defaults to gateway.httpRoute.hostname when empty.
      dnsNames: []
      duration: 2160h          # 90 days
      renewBefore: 360h        # 15 days
      # backendTLSPolicy: generates a Gateway API BackendTLSPolicy so the gateway
      # re-encrypts traffic to the UniFi backend using the issued cert.
      backendTLSPolicy:
        enabled: false
        # For public CAs (Let's Encrypt etc.): set wellKnownCACertificates: System
        # For private CAs: leave empty and set caCertificateRef to a ConfigMap with the CA cert.
        wellKnownCACertificates: ""
        caCertificateRef:
          name: ""     # ConfigMap name containing the CA cert
          key: ca.crt
        # SNI hostname sent to the backend. Defaults to dnsNames[0] / httpRoute.hostname.
        hostname: ""
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      memory: 8Gi
  storage:
    statefulset:
      storageClassName: ""
      sizes:
        persistent: 10Gi
        data: 10Gi
        srv: 5Gi
        unifi: 10Gi
        log: 5Gi
        mongodb: 10Gi
  configOverrides:
    services:
      - id: ulp-go
        dbSecretName: config-override-secret-ulp-go
        dbUser: ulp-go
        dbName: ulp-go
        targetPath: /data/ulp-go/ws/config.props
        loggingKey: ulp-go.config.props
      - id: unifi-credential-server
        dbSecretName: config-override-secret-unifi-credential-server
        dbUser: unifi-credential-server
        dbName: unifi-credential-server
        targetPath: /data/unifi-credential-server/ws/config.props
        loggingKey: unifi-credential-server.config.props
      - id: ucs-user-assets
        dbSecretName: config-override-secret-ucs-user-assets
        dbUser: unifi-credential-server
        dbName: ucs-user-assets
        targetPath: /data/ucs-user-assets/ws/config.props
        loggingKey: ucs-user-assets.config.props
      - id: unifi-directory
        dbSecretName: config-override-secret-unifi-directory
        dbUser: unifi-directory
        dbName: unifi-directory
        targetPath: /data/unifi-directory/ws/config.props
        loggingKey: unifi-directory.config.props
      - id: ucs-agent
        dbSecretName: config-override-secret-ucs-agent
        dbUser: ucs-agent
        dbName: ucs-agent
        targetPath: /data/ucs-agent/ws/config.props
        loggingKey: ucs-agent.config.props
      - id: unifi-identity-update
        dbSecretName: config-override-secret-unifi-identity-update
        dbUser: unifi-identity-update
        dbName: unifi-identity-update
        targetPath: /data/unifi-identity-update/ws/config.props
        loggingKey: unifi-identity-update.config.props
      - id: uid
        dbSecretName: config-override-secret-uid-agent
        dbUser: uid
        dbName: uid
        targetPath: /data/uid/ws/config.props
        loggingKey: uid-agent.config.props
  # Hostname or IP that UniFi devices use to reach the controller for set-inform.
  # Set this to the externally reachable hostname or IP of the controller service.
  # Example: "192.168.1.100" or "unifi.example.com"
  # When empty, devices will not receive a stable inform URL.
  uosSystemIP: ""
  # Gateway API route configuration for Istio/Kubernetes Gateway API.
  gateway:
    parentRef:
      name: ""
      namespace: ""
    httpRouteInform:
      enabled: false
      hostname: ""
      sectionName: ""
      backendPort: 8080
    httpRoute:
      enabled: false
      hostname: ""
      sectionName: ""
      backendPort: 443
    tcpRoute:
      enabled: false
      sectionName: ""
      backendPort: 8080
    udpRoutes:
      discovery:
        enabled: false
        sectionName: ""
        backendPort: 10003
      stun:
        enabled: false
        sectionName: ""
        backendPort: 3478
      syslog:
        enabled: false
        sectionName: ""
        backendPort: 5514
  # Optional Istio DestinationRule for ignoring Unifi's self signed certificates
  istio:
    destinationRule:
      enabled: false
      host: _HT!{{ printf "http.%s.svc.cluster.local" ((index . "PARENT_CONTEXT").Release.Namespace) }}
      port: 443
      tls:
        mode: SIMPLE
        insecureSkipVerify: true
